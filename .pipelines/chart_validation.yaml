trigger: none
pr:
  branches:
    include:
    - master

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      docker pull quay.io/helmpack/chart-testing:v3.3.0
      docker run --rm --name ct --volume $(pwd):/data quay.io/helmpack/chart-testing:v3.3.0 sh -c "ct lint --all --debug --chart-dirs /data/ --chart-dirs /data/helm-azure-vote-app-deployment/"
